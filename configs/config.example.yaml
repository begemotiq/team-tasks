http:
  address: ":8080"
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

database:
  host: localhost
  port: 3306
  user: tasks
  password: tasks
  name: tasks
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 30m

redis:
  address: localhost:6379
  password: ""
  db: 0

jwt:
  secret: "change-me-in-production"
  ttl: 24h

email:
  endpoint: ""
  timeout: 2s
  failure_threshold: 3
  open_timeout: 30s

outbox:
  batch_size: 10
  max_attempts: 5
  poll_interval: 5s
  retry_delay: 1m
  cleanup_interval: 504h
  cleanup_retention: 504h

rate_limit:
  requests_per_minute: 100

logging:
  level: info
  format: json

metrics:
  address: ":9090"
