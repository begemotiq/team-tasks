services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDRESS: ":8080"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: tasks
      MYSQL_PASSWORD: tasks
      MYSQL_DATABASE: tasks
      REDIS_ADDRESS: redis:6379
      JWT_SECRET: "local-dev-secret-change-me"
      RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build: .
    command: ["/app/worker"]
    ports:
      - "9090:9090"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: tasks
      MYSQL_PASSWORD: tasks
      MYSQL_DATABASE: tasks
      EMAIL_ENDPOINT: ""
      METRICS_ADDRESS: ":9090"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/metrics >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks
      MYSQL_USER: tasks
      MYSQL_PASSWORD: tasks
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
